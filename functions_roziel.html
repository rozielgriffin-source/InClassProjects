<!DOCTYPE html>
<html>
    <body>
        <p> Variables are containers that represent different values.</p>
        <button type="button" onclick= "myfunction()"> Click me</button>
        <p id="demo"></p>
        <p id="demo1"></p>
        <script>
            var num1= 732;
            function myfunction() {
                var num2= 115;
                document.getElementById ("demo") .innerHTML= num1 * num2;
                document.getElementById ("demo1") .innerHTML= num1 + num2;
            }
            
        </script>
    </body>
</html>
