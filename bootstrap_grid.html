<!DOCTYPE html>
<html lang="en">
    <head>

        <title>Bootstrap Grid</title>

        <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
        <style>
            .col{
                border: 2px solid coral;
                text-align: center;
            }
        </style>
    </head>
    <body>
        <h1>Grocery Store List</h1>
        <div class="container">
            <div class="row">
                <div class="col">
                    Bread
                </div>
                <div class="col"> 
                    Water
                </div>
                <div class="col">
                    Eggs
                </div>
            </div>
        </div>

        
    </body>
</html>
