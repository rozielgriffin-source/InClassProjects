<!DOCTYPE html>
<html>
<head>
    <title> My superhero Card </title>
    <style>
        body{
            background-color: darkblue;
            color: white;
        }
        .hero-name{
            text-shadow: 3px 3px orange;
            font-weight: bold;
            font-size: 60px;
            color: red;
        }
        .tagline{
            font-style: italic;
            text-transform: capitalize;
            color: lightgray;
        }
        .abilities{
            text-decoration: underline;
            text-transform: uppercase;
        }
        .powers{
            font-style:italic;
            color: coral;
        }
        .weaknesses{
            text-decoration: line-through;
            color: aqua;
        }
        .badge{
            transform: rotate(15);
            font-weight: bold;
            color: black;
            font-size: 32px;
        }
        .footer{
            font-size: 45px;
            text-decoration: underline;
            color: red;
        }

    </style>
</head>
<body>
    <h1 class="hero-name"> Shark Boy</h1>
    <p class="tagline"> Commander of the sea animals</p>
    <h2 class="abilities"> Super powers</h2>
    <p class="powers"> command animals</p>
    <p class="powers"> Breathe underwater</p>
    <h2 class="abilities"> weakness</h2>
    <p class="weaknesses"> He cannot walk on land</p>
    <p class="weaknesses"> He cannot be in the hot sun for too long</p>
    <p class="badge"> Water King</p>
    <p class="footer"> Made by Roziel</p>
</body>
</html>
