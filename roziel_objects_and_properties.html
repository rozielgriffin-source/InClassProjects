<!DOCTYPE html>
<html>
    <head>
        <title> Objects and Properties</title>
    </head>
    <body>
        <h1> Properties</h1>
        <p>Properties can be changed in 2 ways</p>
        <p id="change"></p>
        
        <script>
            var student = {
                studentname : "Roziel",
                fav_animal : "Tiger",
                studentage : 15 
            };
            document.getElementById("change").innerHTML= student.studentname + " is " + student.studentage + " and his favorite animal is a " + student.fav_animal;
        </script>
    </body>
</html>
