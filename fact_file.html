<!DOCTYPE>
<html>
    <head> 
        <title> Fact File</title>
        <style>
            body{
                background-color: teal;
                font-family: Arial, Helvetica, sans-serif;
            }
            .fact-file{
                width: 250px;
                padding: 15px;
                border: 5px solid darkblue;
                margin: 20px;
                background-color: yellow;
                color: crimson;
            }
            .animal-name{
                color: purple;
                font-size: 40px;
            }
            .detail{
                color: darkred;
            }
            .cool-fact{
                color: darkturquoise;
                font-style: italic;
            }
        </style>
    </head>

    <body>
        <div class="fact-file">
        <h1 class="animal-name"> Cheetah </h1>
        <p class="detail"> The cheetah is known as a big cat</p>
        <p class="detail"> It eats small to medium animals like rabits.</p>
        <p class="detail"> It lives in large savannahs and grasslands.</p>
        <p class="cool-fact">It is also the fastest land animal in the world </p>

        </div>
    </body>
</html>
