<!DOCTYPE html>
<html>
    <body>
        <h1> Javascript Addition</h1>
        <p id= "answer"></p>
        <p id= "subtraction"></p>
        <script>
            var num2 = 70593;
            var num3 = 17098;
            var sum = num2 + num3;
            document.getElementById("answer").innerHTML =
            "The total sum is: " + sum;
            var num4 = 17900;
            var num5 = 15250;
            var sub1 = num4 - num5;
            document.getElementById("subtraction").innerHTML =
            "The total subtraction is: " + sub1;
        </script>
    </body>
</html>
